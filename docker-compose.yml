services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: probox_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASS:-azm2shA08}"
      POSTGRES_DB: "${DB_NAME:-probox_bot_db}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-probox_bot_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: probox_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio
    container_name: probox_minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Automatic Backup Service
  postgres-backup:
    image: prodrigestivill/postgres-backup-s3:16 # Matching Postgres version
    container_name: probox_postgres_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # S3 / MinIO Configuration
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY:-minioadmin}"
      S3_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      S3_BUCKET: "${MINIO_BUCKET:-probox-bot-db}"
      S3_REGION: "us-east-1"
      S3_PATH: "backups"
      S3_S3V4: "yes" # MinIO requires S3v4
      # Database Configuration
      POSTGRES_DATABASE: "${DB_NAME:-probox_bot_db}"
      POSTGRES_HOST: "postgres"
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASS:-azm2shA08}"
      # Automatic Scheduling (every 6 hours for frequent "updates")
      SCHEDULE: "@every 6h"
      # Keeps last 7 days of backups
      BACKUP_KEEP_DAYS: 7

  # Utility container to create the MinIO bucket automatically
  minio-init:
    image: minio/mc
    container_name: probox_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb myminio/${MINIO_BUCKET:-probox-bot-db} || true;
      /usr/bin/mc anonymous set public myminio/${MINIO_BUCKET:-probox-bot-db};
      echo 'MinIO bucket initialized.';
      exit 0;
      "


volumes:
  postgres_data:
  redis_data:
  minio_data:
