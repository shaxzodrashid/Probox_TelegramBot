services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: probox_postgres
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASS:-azm2shA08}"
      POSTGRES_DB: "${DB_NAME:-probox_bot_db}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-probox_bot_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: probox_redis
    restart: unless-stopped
    ports:
      - "6378:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3


  # Automatic Backup Service
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16 # Corrected image name
    container_name: probox_postgres_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # S3 / MinIO Configuration
      S3_ENDPOINT: "${EXTERNAL_MINIO_URL:-http://host.docker.internal:9000}"
      S3_ACCESS_KEY_ID: "${MINIO_ACCESS_KEY:-minioadmin}"
      S3_SECRET_ACCESS_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      S3_BUCKET: "${MINIO_BUCKET:-probox-bot-db}"
      S3_REGION: "us-east-1"
      S3_PATH: "backups"
      S3_S3V4: "yes" # MinIO requires S3v4
      # Database Configuration
      POSTGRES_DATABASE: "${DB_NAME:-probox_bot_db}"
      POSTGRES_HOST: "postgres"
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASS:-azm2shA08}"
      # Automatic Scheduling (every 6 hours for frequent "updates")
      SCHEDULE: "@every 6h"
      # Keeps last 7 days of backups
      BACKUP_KEEP_DAYS: 7
    extra_hosts:
      - "host.docker.internal:host-gateway"


  # Application Service
  bot:
    build: .
    container_name: probox_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"


volumes:
  postgres_data:
  redis_data:
